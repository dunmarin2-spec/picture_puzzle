<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진짜 곡선 퍼즐: 100 마스터피스</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        header { padding: 15px; width: 100%; text-align: center; background: #000; border-bottom: 1px solid #333; z-index: 10; }
        h1 { color: var(--gold); margin: 0; font-size: 1.2rem; }
        
        #info-box { margin: 10px; text-align: center; z-index: 10; }
        #game-container { position: relative; background: #111; box-shadow: 0 0 50px #000; }
        
        /* 퍼즐 조각 공통 스타일 */
        .piece { 
            position: absolute; 
            cursor: grab; 
            filter: drop-shadow(0px 0px 2px rgba(0,0,0,0.5));
        }
        .piece:active { cursor: grabbing; z-index: 999 !important; filter: drop-shadow(0px 0px 8px var(--gold)); }
        .matched { cursor: default; z-index: 1 !important; filter: none !important; }

        .btn-box { margin-top: 20px; z-index: 10; }
        button { padding: 10px 20px; background: #222; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

<header><h1>REAL JIGSAW HISTORY</h1></header>

<div id="info-box">
    <h2 id="puzzle-title" style="color:var(--gold); margin: 5px 0; font-size: 1.1rem;">로딩 중...</h2>
</div>

<div id="game-container"></div>

<div class="btn-box">
    <button onclick="newGame()">새로운 랜덤 퍼즐</button>
    <button onclick="shufflePieces()" style="margin-left:10px;">다시 섞기</button>
</div>

<script src="data.js"></script>
<script>
    const container = document.getElementById('game-container');
    const titleEl = document.getElementById('puzzle-title');
    
    let currentPuzzle = null;
    let pieces = [];
    const sideCount = 10; // 100조각
    let boardSize = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.6, 600);
    let pSize = boardSize / sideCount;
    let tabSize = pSize * 0.25; // 튀어나온 코 부분 크기

    window.onload = () => {
        const saved = localStorage.getItem('jigsaw_puzzle_save');
        if (saved) {
            const parsed = JSON.parse(saved);
            currentPuzzle = parsed.info;
            pieces = parsed.data;
            titleEl.innerText = currentPuzzle.title;
            renderPieces();
        } else {
            newGame();
        }
    };

    function newGame() {
        const randomIdx = Math.floor(Math.random() * puzzleList.length);
        currentPuzzle = puzzleList[randomIdx];
        titleEl.innerText = currentPuzzle.title;
        
        container.style.width = boardSize + 'px';
        container.style.height = boardSize + 'px';

        createPieces();
        shufflePieces();
    }

    function createPieces() {
        pieces = [];
        // 조각마다 상하좌우 '탭(Tab)' 모양을 랜덤하게 결정 (1: 튀어나옴, -1: 들어감, 0: 평평)
        const tabs = [];
        for (let r = 0; r <= sideCount; r++) {
            tabs[r] = [];
            for (let c = 0; c <= sideCount; c++) {
                tabs[r][c] = {
                    h: (c === 0 || c === sideCount) ? 0 : (Math.random() > 0.5 ? 1 : -1),
                    v: (r === 0 || r === sideCount) ? 0 : (Math.random() > 0.5 ? 1 : -1)
                };
            }
        }

        for (let r = 0; r < sideCount; r++) {
            for (let c = 0; c < sideCount; c++) {
                pieces.push({
                    id: `p-${r}-${c}`,
                    r, c,
                    cx: c * pSize, cy: r * pSize, // 정답 위치
                    px: 0, py: 0,
                    m: false,
                    // 인접한 탭 정보 저장
                    t: tabs[r][c].v,  // 위
                    b: tabs[r+1][c].v, // 아래
                    l: tabs[r][c].h,  // 왼쪽
                    ri: tabs[r][c+1].h // 오른쪽
                });
            }
        }
    }

    // SVG 패스로 퍼즐 조각 모양 생성
    function getPath(p) {
        const s = pSize;
        const t = tabSize;
        // 시작점
        let path = `M ${t} ${t}`;
        
        // 상단 변
        path += ` h ${s/2 - t} ${p.t ? `c 0 ${-t} ${t} ${-t} ${t} 0 c 0 ${t} ${-t} ${t} ${-t} 0` : ''} h ${s/2 - t}`;
        // 우측 변
        path += ` v ${s/2 - t} ${p.ri ? `c ${t} 0 ${t} ${t} 0 ${t} c ${-t} 0 ${-t} ${-t} 0 ${-t}` : ''} v ${s/2 - t}`;
        // 하단 변
        path += ` h ${-(s/2 - t)} ${p.b ? `c 0 ${t} ${-t} ${t} ${-t} 0 c 0 ${-t} ${t} ${-t} ${t} 0` : ''} h ${-(s/2 - t)}`;
        // 좌측 변
        path += ` v ${-(s/2 - t)} ${p.l ? `c ${-t} 0 ${-t} ${-t} 0 ${-t} c ${t} 0 ${t} ${t} 0 ${t}` : ''} v ${-(s/2 - t)} Z`;

        return path;
    }

    function renderPieces() {
        container.innerHTML = '';
        container.style.width = boardSize + 'px';
        container.style.height = boardSize + 'px';

        pieces.forEach(p => {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("class", `piece ${p.m ? 'matched' : ''}`);
            // 탭 공간 확보를 위해 실제 pSize보다 크게 설정
            const viewSize = pSize + tabSize * 2;
            svg.setAttribute("width", viewSize);
            svg.setAttribute("height", viewSize);
            svg.style.left = (p.px - tabSize) + 'px';
            svg.style.top = (p.py - tabSize) + 'px';

            const maskId = `mask-${p.id}`;
            svg.innerHTML = `
                <defs>
                    <clipPath id="${maskId}">
                        <path d="${getPath(p)}" />
                    </clipPath>
                </defs>
                <image href="${currentPuzzle.url}" 
                    x="${-p.cx + tabSize}" y="${-p.cy + tabSize}" 
                    width="${boardSize}" height="${boardSize}" 
                    clip-path="url(#${maskId})" />
            `;

            if (!p.m) addEvents(svg, p);
            container.appendChild(svg);
        });
    }

    function addEvents(el, pObj) {
        const move = (e) => {
            let cx = e.touches ? e.touches[0].clientX : e.clientX;
            let cy = e.touches ? e.touches[0].clientY : e.clientY;
            let rect = container.getBoundingClientRect();
            let x = cx - rect.left - (pSize/2);
            let y = cy - rect.top - (pSize/2);
            
            el.style.left = (x - tabSize) + 'px';
            el.style.top = (y - tabSize) + 'px';
            pObj.px = x; pObj.py = y;
        };

        const stop = () => {
            document.removeEventListener('mousemove', move);
            document.removeEventListener('touchmove', move);
            
            if (Math.abs(pObj.px - pObj.cx) < 12 && Math.abs(pObj.py - pObj.cy) < 12) {
                pObj.px = pObj.cx; pObj.py = pObj.cy;
                pObj.m = true;
                renderPieces();
                saveGame();
            }
        };

        el.addEventListener('mousedown', () => {
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', stop, {once:true});
        });
        el.addEventListener('touchstart', (e) => {
            if(e.cancelable) e.preventDefault();
            document.addEventListener('touchmove', move, {passive:false});
            document.addEventListener('touchend', stop, {once:true});
        });
    }

    function shufflePieces() {
        pieces.forEach(p => {
            if (!p.m) {
                p.px = Math.random() * (boardSize - pSize);
                p.py = Math.random() * (boardSize - pSize);
            }
        });
        renderPieces();
        saveGame();
    }

    function saveGame() {
        localStorage.setItem('jigsaw_puzzle_save', JSON.stringify({info: currentPuzzle, data: pieces}));
    }
</script>
</body>
</html>
