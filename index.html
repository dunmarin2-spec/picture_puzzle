<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>역사의 조각 PRO (로딩 해결 버전)</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; }
        
        /* 🔴 화면 고정 및 스크롤 차단 */
        html, body { 
            position: fixed; width: 100%; height: 100%; overflow: hidden; 
            touch-action: none; background: var(--dark); color: white; 
            font-family: sans-serif; margin: 0; display: flex; 
            flex-direction: column; align-items: center; 
        }

        header { padding: 10px; width: 100%; text-align: center; background: #000; border-bottom: 1px solid #333; flex-shrink: 0; }
        h1 { color: var(--gold); margin: 0; font-size: 1rem; }
        
        #game-container { 
            position: relative; background: #111; margin-top: 15px;
            border: 2px solid #333; touch-action: none; 
        }
        
        /* 🔴 지그소 조각 스타일: 캔버스 대신 SVG 마스킹 사용 */
        .piece { 
            position: absolute; cursor: grab; 
            filter: drop-shadow(0px 0px 1px rgba(255,255,255,0.7)) drop-shadow(1px 1px 3px rgba(0,0,0,1));
            touch-action: none;
        }
        
        .piece path { stroke: rgba(212, 175, 55, 0.6); stroke-width: 1.5px; fill: none; }
        .piece:active { cursor: grabbing; z-index: 999 !important; filter: drop-shadow(0px 0px 10px var(--gold)); }
        
        /* 맞췄을 때 경계선 제거 */
        .matched { cursor: default; z-index: 1 !important; filter: none !important; }
        .matched path { stroke: none !important; }

        .btn-box { margin-top: 20px; display: flex; gap: 10px; flex-shrink: 0; }
        button { padding: 10px 20px; background: #222; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        #loading-msg { position: fixed; top: 50%; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<header><h1>PIECES OF HISTORY PRO</h1></header>

<div id="loading-msg">유물 이미지를 복원하는 중...</div>
<div id="info-box" style="margin-top:10px; text-align:center;">
    <h2 id="puzzle-title" style="color:var(--gold); margin: 5px 0; font-size: 1rem;"></h2>
</div>

<div id="game-container"></div>

<div class="btn-box">
    <button onclick="newGame()">새로운 유물</button>
    <button onclick="shufflePieces()">섞기</button>
</div>

<script src="data.js"></script>
<script>
    const container = document.getElementById('game-container');
    const titleEl = document.getElementById('puzzle-title');
    const loadMsg = document.getElementById('loading-msg');
    
    let currentPuzzle = null, pieces = [], sideCount = 10; 
    let boardSize = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.7, 600);
    let pSize = boardSize / sideCount, tabSize = pSize * 0.3;

    window.onload = () => {
        // 터치 기본동작(스크롤) 차단
        document.addEventListener('touchmove', e => { if (e.target.closest('.piece')) e.preventDefault(); }, { passive: false });

        const saved = localStorage.getItem('final_jigsaw_save');
        if (saved) {
            const parsed = JSON.parse(saved);
            currentPuzzle = parsed.info;
            pieces = parsed.data;
            initGame(true);
        } else {
            newGame(false);
        }
    };

    function newGame(confirmReq = true) {
        if (confirmReq && !confirm("새로운 그림을 불러올까요?")) return;
        localStorage.removeItem('final_jigsaw_save');
        currentPuzzle = puzzleList[Math.floor(Math.random() * puzzleList.length)];
        createPieces();
        initGame(false);
    }

    function initGame(isResume) {
        titleEl.innerText = currentPuzzle.title;
        container.style.width = boardSize + 'px';
        container.style.height = boardSize + 'px';
        
        // 이미지 로딩 확인 후 렌더링
        const tempImg = new Image();
        tempImg.src = currentPuzzle.url;
        tempImg.onload = () => {
            loadMsg.style.display = 'none';
            if (!isResume) shufflePieces();
            renderPieces();
        };
        tempImg.onerror = () => {
            loadMsg.innerText = "이미지 주소가 만료되었습니다. 새로고침하세요.";
        };
    }

    function createPieces() {
        pieces = [];
        const hTabs = [], vTabs = [];
        for (let r = 0; r <= sideCount; r++) {
            hTabs[r] = []; vTabs[r] = [];
            for (let c = 0; c <= sideCount; c++) {
                hTabs[r][c] = (c === 0 || c === sideCount) ? 0 : (Math.random() > 0.5 ? 1 : -1);
                vTabs[r][c] = (r === 0 || r === sideCount) ? 0 : (Math.random() > 0.5 ? 1 : -1);
            }
        }
        for (let r = 0; r < sideCount; r++) {
            for (let c = 0; c < sideCount; c++) {
                pieces.push({
                    id: `p-${r}-${c}`, r, c, cx: c * pSize, cy: r * pSize, px: 0, py: 0, m: false,
                    tT: vTabs[r][c], bT: vTabs[r + 1][c], lT: hTabs[r][c], rT: hTabs[r][c + 1]
                });
            }
        }
    }

    function getPath(p) {
        const s = pSize, t = tabSize, n = s * 0.2, ts = t;
        let path = `M ${ts} ${ts}`;
        if (p.tT !== 0) path += ` L ${ts+s/2-n/2} ${ts} C ${ts+s/2-n} ${ts-ts*p.tT}, ${ts+s/2+n} ${ts-ts*p.tT}, ${ts+s/2+n/2} ${ts}`;
        path += ` L ${ts+s} ${ts}`;
        if (p.rT !== 0) path += ` L ${ts+s} ${ts+s/2-n/2} C ${ts+s+ts*p.rT} ${ts+s/2-n}, ${ts+s+ts*p.rT} ${ts+s/2+n}, ${ts+s} ${ts+s/2+n/2}`;
        path += ` L ${ts+s} ${ts+s}`;
        if (p.bT !== 0) path += ` L ${ts+s/2+n/2} ${ts+s} C ${ts+s/2+n} ${ts+s+ts*p.bT}, ${ts+s/2-n} ${ts+s+ts*p.bT}, ${ts+s/2-n/2} ${ts+s}`;
        path += ` L ${ts} ${ts+s}`;
        if (p.lT !== 0) path += ` L ${ts} ${ts+s/2+n/2} C ${ts-ts*p.lT} ${ts+s/2+n}, ${ts-ts*p.lT} ${ts+s/2-n}, ${ts} ${ts+s/2-n/2}`;
        path += ` Z`;
        return path;
    }

    function renderPieces() {
        container.innerHTML = '';
        const fullW = pSize + tabSize * 2;
        pieces.forEach(p => {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("class", `piece ${p.m ? 'matched' : ''}`);
            svg.setAttribute("width", fullW);
            svg.setAttribute("height", fullW);
            svg.style.left = (p.px - tabSize) + 'px';
            svg.style.top = (p.py - tabSize) + 'px';

            const maskId = `mask-${p.id}`;
            svg.innerHTML = `
                <defs><clipPath id="${maskId}"><path d="${getPath(p)}" /></clipPath></defs>
                <g clip-path="url(#${maskId})">
                    <image href="${currentPuzzle.url}" x="${-p.cx + tabSize}" y="${-p.cy + tabSize}" width="${boardSize}" height="${boardSize}" />
                </g>
                <path d="${getPath(p)}" />
            `;
            if (!p.m) addEvents(svg, p);
            container.appendChild(svg);
        });
    }

    function addEvents(el, pObj) {
        const move = (e) => {
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = container.getBoundingClientRect();
            let x = Math.max(0, Math.min(cx - rect.left - pSize/2, boardSize - pSize));
            let y = Math.max(0, Math.min(cy - rect.top - pSize/2, boardSize - pSize));
            el.style.left = (x - tabSize) + 'px'; el.style.top = (y - tabSize) + 'px';
            pObj.px = x; pObj.py = y;
        };
        const stop = () => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            if (Math.abs(pObj.px - pObj.cx) < 12 && Math.abs(pObj.py - pObj.cy) < 12) {
                pObj.px = pObj.cx; pObj.py = pObj.cy; pObj.m = true;
                renderPieces(); saveGame();
            }
        };
        const start = () => {
            document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
            document.addEventListener('touchmove', move, {passive:false}); document.addEventListener('touchend', stop);
        };
        el.addEventListener('mousedown', start); el.addEventListener('touchstart', start, {passive:false});
    }

    function shufflePieces() {
        pieces.forEach(p => { if (!p.m) { p.px = Math.random()*(boardSize-pSize); p.py = Math.random()*(boardSize-pSize); } });
        renderPieces(); saveGame();
    }
    function saveGame() { localStorage.setItem('final_jigsaw_save', JSON.stringify({info: currentPuzzle, data: pieces})); }
</script>
</body>
</html>
