<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로 지그소 퍼즐: 100조각 복원</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        header { padding: 15px; width: 100%; text-align: center; background: #000; border-bottom: 1px solid #333; z-index: 10; }
        h1 { color: var(--gold); margin: 0; font-size: 1.2rem; }
        #game-container { position: relative; background: #111; box-shadow: 0 0 50px #000; margin-top: 20px; }
        
        .piece { position: absolute; cursor: grab; filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.8)); }
        .piece:active { cursor: grabbing; z-index: 999 !important; filter: drop-shadow(0px 0px 10px var(--gold)); }
        .matched { cursor: default; z-index: 1 !important; filter: drop-shadow(0.5px 0.5px 0.5px rgba(255,255,255,0.1)) !important; }

        .btn-box { margin-top: 20px; z-index: 10; }
        button { padding: 10px 20px; background: #222; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

<header><h1>PIECES OF HISTORY (REAL JIGSAW)</h1></header>

<div id="info-box" style="margin-top:10px; text-align:center;">
    <h2 id="puzzle-title" style="color:var(--gold); margin: 5px 0; font-size: 1.1rem;"></h2>
</div>

<div id="game-container"></div>

<div class="btn-box">
    <button onclick="location.reload()">새로운 랜덤 퍼즐</button>
    <button onclick="shufflePieces()" style="margin-left:10px;">다시 섞기</button>
</div>

<script src="data.js"></script>
<script>
    const container = document.getElementById('game-container');
    const titleEl = document.getElementById('puzzle-title');
    
    let currentPuzzle = null;
    let pieces = [];
    const sideCount = 10; // 10x10 = 100조각
    let boardSize = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.7, 600);
    let pSize = boardSize / sideCount;
    let tabSize = pSize * 0.3; // 퍼즐 귀(Tab)의 크기

    window.onload = () => {
        const saved = localStorage.getItem('pro_jigsaw_save');
        if (saved) {
            const parsed = JSON.parse(saved);
            currentPuzzle = parsed.info;
            pieces = parsed.data;
            titleEl.innerText = currentPuzzle.title;
            renderPieces();
        } else {
            initNewGame();
        }
    };

    function initNewGame() {
        const randomIdx = Math.floor(Math.random() * puzzleList.length);
        currentPuzzle = puzzleList[randomIdx];
        titleEl.innerText = currentPuzzle.title;
        container.style.width = boardSize + 'px';
        container.style.height = boardSize + 'px';

        createPieces();
        shufflePieces();
    }

    function createPieces() {
        pieces = [];
        const horizontalTabs = [];
        const verticalTabs = [];

        for (let r = 0; r <= sideCount; r++) {
            horizontalTabs[r] = [];
            verticalTabs[r] = [];
            for (let c = 0; c <= sideCount; c++) {
                horizontalTabs[r][c] = (c === 0 || c === sideCount) ? 0 : (Math.random() > 0.5 ? 1 : -1);
                verticalTabs[r][c] = (r === 0 || r === sideCount) ? 0 : (Math.random() > 0.5 ? 1 : -1);
            }
        }

        for (let r = 0; r < sideCount; r++) {
            for (let c = 0; c < sideCount; c++) {
                pieces.push({
                    id: `p-${r}-${c}`, r, c,
                    cx: c * pSize, cy: r * pSize,
                    px: 0, py: 0, m: false,
                    topTab: verticalTabs[r][c],
                    bottomTab: verticalTabs[r + 1][c],
                    leftTab: horizontalTabs[r][c],
                    rightTab: horizontalTabs[r][c + 1]
                });
            }
        }
    }

    // 사진에서 보신 진짜 퍼즐 조각의 곡선 모양을 그리는 핵심 함수
    function drawJigsawShape(p) {
        const s = pSize;
        const t = tabSize;
        const neck = s * 0.2; // 목 부분 너비

        // 상단 시작 (왼쪽 위에서 오른쪽으로)
        let path = `M ${t} ${t}`;
        if (p.topTab !== 0) {
            path += ` L ${t + s/2 - neck/2} ${t}`;
            path += ` C ${t + s/2 - neck} ${t - t*p.topTab}, ${t + s/2 + neck} ${t - t*p.topTab}, ${t + s/2 + neck/2} ${t}`;
        }
        path += ` L ${t + s} ${t}`;

        // 우측 (위에서 아래로)
        if (p.rightTab !== 0) {
            path += ` L ${t + s} ${t + s/2 - neck/2}`;
            path += ` C ${t + s + t*p.rightTab} ${t + s/2 - neck}, ${t + s + t*p.rightTab} ${t + s/2 + neck}, ${t + s} ${t + s/2 + neck/2}`;
        }
        path += ` L ${t + s} ${t + s}`;

        // 하단 (오른쪽에서 왼쪽으로)
        if (p.bottomTab !== 0) {
            path += ` L ${t + s/2 + neck/2} ${t + s}`;
            path += ` C ${t + s/2 + neck} ${t + s + t*p.bottomTab}, ${t + s/2 - neck} ${t + s + t*p.bottomTab}, ${t + s/2 - neck/2} ${t + s}`;
        }
        path += ` L ${t} ${t + s}`;

        // 좌측 (아래에서 위로)
        if (p.leftTab !== 0) {
            path += ` L ${t} ${t + s/2 + neck/2}`;
            path += ` C ${t - t*p.leftTab} ${t + s/2 + neck}, ${t - t*p.leftTab} ${t + s/2 - neck}, ${t} ${t + s/2 - neck/2}`;
        }
        path += ` L ${t} ${t} Z`;

        return path;
    }

    function renderPieces() {
        container.innerHTML = '';
        container.style.width = boardSize + 'px';
        container.style.height = boardSize + 'px';

        pieces.forEach(p => {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("class", `piece ${p.m ? 'matched' : ''}`);
            const totalWidth = pSize + tabSize * 2;
            svg.setAttribute("width", totalWidth);
            svg.setAttribute("height", totalWidth);
            svg.style.left = (p.px - tabSize) + 'px';
            svg.style.top = (p.py - tabSize) + 'px';

            const maskId = `mask-${p.id}`;
            svg.innerHTML = `
                <defs>
                    <clipPath id="${maskId}">
                        <path d="${drawJigsawShape(p)}" />
                    </clipPath>
                </defs>
                <image href="${currentPuzzle.url}" 
                    x="${-p.cx + tabSize}" y="${-p.cy + tabSize}" 
                    width="${boardSize}" height="${boardSize}" 
                    clip-path="url(#${maskId})" />
            `;

            if (!p.m) addEvents(svg, p);
            container.appendChild(svg);
        });
    }

    function addEvents(el, pObj) {
        const move = (e) => {
            let cx = e.touches ? e.touches[0].clientX : e.clientX;
            let cy = e.touches ? e.touches[0].clientY : e.clientY;
            let rect = container.getBoundingClientRect();
            let x = cx - rect.left - (pSize/2);
            let y = cy - rect.top - (pSize/2);
            el.style.left = (x - tabSize) + 'px';
            el.style.top = (y - tabSize) + 'px';
            pObj.px = x; pObj.py = y;
        };

        const stop = () => {
            document.removeEventListener('mousemove', move);
            document.removeEventListener('touchmove', move);
            if (Math.abs(pObj.px - pObj.cx) < 10 && Math.abs(pObj.py - pObj.cy) < 10) {
                pObj.px = pObj.cx; pObj.py = pObj.cy;
                pObj.m = true;
                renderPieces();
                saveGame();
            }
        };

        el.onmousedown = () => {
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', stop, {once:true});
        };
        el.ontouchstart = (e) => {
            if(e.cancelable) e.preventDefault();
            document.addEventListener('touchmove', move, {passive:false});
            document.addEventListener('touchend', stop, {once:true});
        };
    }

    function shufflePieces() {
        pieces.forEach(p => {
            if (!p.m) {
                p.px = Math.random() * (boardSize - pSize);
                p.py = Math.random() * (boardSize - pSize);
            }
        });
        renderPieces();
        saveGame();
    }

    function saveGame() {
        localStorage.setItem('pro_jigsaw_save', JSON.stringify({info: currentPuzzle, data: pieces}));
    }
</script>
</body>
</html>
